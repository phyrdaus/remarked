<!doctype html>
<!-- Source for the extension icon. Rendered to media/icon.png via headless Chrome.
     A geometric "M" whose central downstroke is a down-arrow (markdown), in an
     accent color that harmonizes with the indigo→violet tile. -->
<html>
<head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0;background:transparent}
  svg{display:block}
</style></head>
<body>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="256" height="256" rx="56" ry="56" fill="url(#g)"/>

  <!-- M outer posts (white) -->
  <g fill="#ffffff">
    <rect x="58" y="80" width="26" height="96" rx="6"/>
    <rect x="172" y="80" width="26" height="96" rx="6"/>
  </g>

  <!-- central down-arrow = the middle of the M, accent color -->
  <g fill="none" stroke="#FBBF24" stroke-width="26" stroke-linecap="round" stroke-linejoin="round">
    <!-- chevron arms from the top of each post, dipping to centre (the M valley) -->
    <polyline points="71,84 128,130 185,84"/>
    <!-- shaft continuing down -->
    <line x1="128" y1="130" x2="128" y2="150"/>
  </g>
  <!-- arrowhead -->
  <polygon points="100,146 156,146 128,184" fill="#FBBF24"/>
</svg>
</body>
</html>
