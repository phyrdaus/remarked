name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: xvfb-run -a npm run test:integration
      - run: npx vsce package --no-dependencies
      - uses: actions/upload-artifact@v7
        with:
          name: vsix
          path: "*.vsix"
