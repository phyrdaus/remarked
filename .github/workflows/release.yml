name: Release
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # Job-level so the step `if` below sees it unambiguously (step-own env
      # visibility inside its own `if` varies by runner version).
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npx vsce package --no-dependencies
      - name: GitHub release with VSIX
        run: gh release create "$GITHUB_REF_NAME" *.vsix --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Publish to Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: npx vsce publish --no-dependencies -p "$VSCE_PAT"
