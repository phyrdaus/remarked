# Dependabot version updates. Security updates are handled separately
# (Settings → Code security). Docs:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # npm — runtime deps are bundled into the VSIX; dev deps are build/test only.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      # @types/node must track VS Code's runtime Node (engines ^1.100.0 → Node
      # 20), not "latest". Hold the major; still take 20.x patches/minors.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # @types/vscode must equal engines.vscode (^1.100.0) — vsce package fails
      # if it's higher. Only bump deliberately when raising the min VS Code
      # version. Hold minor + major; patches stay within the same API level.
      - dependency-name: "@types/vscode"
        update-types:
          ["version-update:semver-major", "version-update:semver-minor"]
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"

  # GitHub Actions used by ci.yml / release.yml.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
